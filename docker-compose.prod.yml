version: '3.8'

services:
  # Database
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"

  # Cache
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  # Backend API
  backend:
    build: ./backend
    ports: [] 
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - MONGO_URL=mongodb://mongo:27017/ecommerce
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis

  # Backend Load Balancer (Nginx)
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"  # Backend API available at http://localhost/api/
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  # Frontend React App (Production Multi-stage Build)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod  # Uses the multi-stage build!
    ports:
      - "3000:80"  # Frontend available at http://localhost:3000
    depends_on:
      - backend
