worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # 1. The Load Balancer: Points to your Docker backend services
    upstream mern_backend {
        # 'backend' matches the service name in docker-compose
        server backend:8000;
    }

    server {
        listen 80;

        # 2. Route all API traffic to the Load Balancer
        location /api/ {
            proxy_pass http://mern_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Optional: Add timeout headers for slower DB queries
            proxy_read_timeout 60s;
        }

        # 3. (Optional) Route frontend traffic if serving React through Nginx
        # location / {
        #     proxy_pass http://frontend:5173;
        # }
    }
}
