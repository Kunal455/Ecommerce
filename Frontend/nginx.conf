server {
    listen 80;

    # Where the frontend files are stored
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # This is CRITICAL for React Router!
        # It tells Nginx to fallback to index.html if a file isn't found,
        # allowing React to handle the routing on the client side.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
