version: '3.8'

services:
  # Your existing Database/Redis
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  # The Backend Service
  backend:
    build: ./backend
    # EXPOSE 8000 internally to Docker, DO NOT map to host ports (e.g., no "8000:8000")
    # Mapping to host ports breaks scaling because multiple containers can't share port 8000 on your host PC
    ports: [] 
    expose:
      - "8000"
    environment:
      - PORT=8000
      - MONGO_URI=mongodb://mongo:27017/ecommerce
      - REDIS_URL=redis://redis:6379
      # Add your Cloudinary/JWT env variables here...
    depends_on:
      - mongo
      - redis

  # The NGINX Load Balancer
  nginx:
    image: nginx:latest
    ports:
      - "80:80" # Only Nginx is exposed to your local machine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
