version: '3.8'

services:
  # Your existing Database/Redis
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports: [] 
    expose:
      - "8000"
    environment:
      - PORT=8000
      - MONGO_URI=mongodb://mongo:27017/ecommerce
      - REDIS_URL=redis://redis:6379
      # Add your Cloudinary/JWT env variables here...
    depends_on:
      - mongo
      - redis

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
